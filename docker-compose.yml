services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: openenrich
      POSTGRES_PASSWORD: openenrich
      POSTGRES_DB: openenrich
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://openenrich:openenrich@postgres:5432/openenrich
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    volumes: [.:/code]

  worker:
    build: .
    command: celery -A app.tasks worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://openenrich:openenrich@postgres:5432/openenrich
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    volumes: [.:/code]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [web]
    volumes:
      - ./frontend/app:/code/app
      - ./frontend/lib:/code/lib

volumes:
  pgdata:
